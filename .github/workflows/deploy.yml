# Deploy Next.js (Faust) frontend to DigitalOcean over SSH.
#
# Required GitHub Actions *secrets* (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — droplet hostname or IP (e.g. 64.23.192.136)
#   DEPLOY_USER       — SSH user (e.g. root)
#   DEPLOY_SSH_KEY    — private key (full PEM) whose public key is in ~/.ssh/authorized_keys on the server
#   FAUST_SECRET_KEY  — must match WordPress → Faust plugin settings
#
# Required repository *variables*:
#   NEXT_PUBLIC_WORDPRESS_URL — WordPress base URL (e.g. http://YOUR_IP), not the :8080 Next URL.
# Optional repository *variables*:
#   DEPLOY_PATH — absolute path to the repo on the server (default below).
#
# If npm ci exits 137 / "Killed": the droplet likely ran out of RAM (OOM). This workflow
# enables a 2G swapfile when running as root on <2GiB RAM (idempotent). Or run scripts/setup-server.sh
# (CREATE_SWAP=1) or resize the droplet.

name: Deploy frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FAUST_SECRET_KEY: ${{ secrets.FAUST_SECRET_KEY }}
          NEXT_PUBLIC_WORDPRESS_URL: ${{ vars.NEXT_PUBLIC_WORDPRESS_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 40m
          envs: FAUST_SECRET_KEY,NEXT_PUBLIC_WORDPRESS_URL
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/var/www/west-idaho-anesthesia"
            fi
            if [ -z "${NEXT_PUBLIC_WORDPRESS_URL:-}" ]; then
              echo "Set repository variable NEXT_PUBLIC_WORDPRESS_URL to your WordPress URL (e.g. http://YOUR_IP), not the :8080 Next URL." >&2
              exit 1
            fi
            if [ "$(id -u)" -eq 0 ]; then
              MEM_KB="$(awk '/^MemTotal:/ {print $2}' /proc/meminfo)"
              if [ "${MEM_KB:-0}" -lt 2097152 ] && ! swapon --show 2>/dev/null | grep -q '/swapfile'; then
                if [ ! -f /swapfile ]; then
                  fallocate -l 2G /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=2048 status=none
                  chmod 600 /swapfile
                  mkswap /swapfile
                fi
                swapon /swapfile
                grep -q '^/swapfile' /etc/fstab 2>/dev/null || echo '/swapfile none swap sw 0 0' >> /etc/fstab
              fi
            fi
            cd "$DEPLOY_PATH"
            git fetch origin main
            git checkout -B main origin/main
            {
              printf '%s\n' "FAUST_SECRET_KEY=${FAUST_SECRET_KEY}"
              printf '%s\n' "NEXT_PUBLIC_WORDPRESS_URL=${NEXT_PUBLIC_WORDPRESS_URL}"
            } > frontend/.env.local
            cd frontend
            # #region agent log
            echo "{\"sessionId\":\"f170bc\",\"hypothesisId\":\"H1\",\"location\":\"deploy.yml:pre-npm-ci\",\"message\":\"memory\",\"data\":{\"mem_total_kb\":$(awk '/^MemTotal:/ {print $2}' /proc/meminfo),\"mem_avail_kb\":$(awk '/^MemAvailable:/ {print $2}' /proc/meminfo),\"swap_lines\":$(swapon --show 2>/dev/null | wc -l | tr -d ' ')},\"timestamp\":$(date +%s)000}" >&2
            # #endregion
            export NPM_CONFIG_MAXSOCKETS=5
            npm ci --no-audit --no-fund
            npm run build -- --skip-health-checks
            pm2 delete wia-frontend 2>/dev/null || true
            pm2 start npm --name wia-frontend --cwd "$DEPLOY_PATH/frontend" -- start
            pm2 save
